<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Vistorias</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>

    <header class="main-header">
        <a href="../index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
        <h1>Gerenciador de Vistorias</h1>
    </header>

    <main class="home-container">
        <div class="home-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInp" placeholder="Pesquisar por unidade...">
            </div>
            <a href="editor.html" class="btn">
                <i class="fas fa-plus"></i> Nova Vistoria
            </a>
        </div>

        <div id="vistoriasGrid" class="vistorias-grid">
            <!-- Cards das vistorias serão carregados aqui -->
            <div class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <p>Nenhuma vistoria encontrada.</p>
            </div>
        </div>
    </main>

    <script src="utils.js"></script>
    <script src="home.js"></script>
</body>
</html>
