<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Vistorias</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>

    <header class="main-header">
        <a href="../index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
        <h1>Relatório de Vistoria Prévia</h1>
        <button id="btnComoUsar" class="btn-help">
            <i class="fas fa-question-circle"></i> Como usar?
        </button>
    </header>

    <main class="home-container">
        <div class="home-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInp" placeholder="Pesquisar por unidade...">
            </div>
            <a href="editor.html" class="btn">
                <i class="fas fa-plus"></i> Nova Vistoria
            </a>
        </div>

        <div id="vistoriasGrid" class="vistorias-grid">
            <!-- Mensagem inicial de carregamento -->
            <div id="loadingState" class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Carregando vistorias da nuvem...</p>
            </div>
        </div>
    </main>

    <!-- Modal de Vídeo -->
    <div id="modalVideo" class="modal-video">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-container">
                <video id="playerVideo" controls preload="auto" style="width: 100%; height: auto; display: block;">
                    <source src="assets/tutorial.mp4" type="video/mp4">
                    Seu navegador não suporta a reprodução de vídeos.
                </video>
            </div>
        </div>
    </div>

    <!-- SDK do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>


    <!-- Seus scripts -->
    <script src="utils.js"></script>
    <script src="home.js"></script>
</body>
</html>
