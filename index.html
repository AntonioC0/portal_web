<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Sites</title>
    <style>
        :root {
            --primary-color: #333;
            --secondary-color: #666;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            padding: 40px 20px;
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        header p {
            color: var(--secondary-color);
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
        }

        .icon-container {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 14px;
            color: var(--secondary-color);
            line-height: 1.4;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Operações com Produtos</h1>
            <p>Escolha uma ação para continuar</p>
        </header>

        <div class="grid">
            <!-- Card 1 -->
            <a href="Padronização de planilha - Quebra de Embarque/index.html" class="card">
                <div class="icon-container">
                    <!-- Substitua o src pelo caminho da sua imagem -->
                    <img src="assets/icone-padronizacao.png" alt="Padronização">
                </div>
                <h2>Padronização de Planilha</h2>
                <p>Padronizar Planilha de Quebra de Transbordo.</p>
            </a>

            <!-- Card 2 -->
            <a href="Relatório Vistoria Unidades/index.html" class="card">
                <div class="icon-container">
                    <img src="assets/icone-vistoria.png" alt="Dashboards">
                </div>
                <h2>Vistoria Unidades</h2>
                <p>Relatório de Vistoria das Unidades</p>
            </a>

        </div>
    </div>

</body>
</html>
